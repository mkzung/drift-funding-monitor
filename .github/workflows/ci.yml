name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python -m ruff check src/ tests/
      - run: python -m mypy src/dfm
      - run: python -m pytest tests/ --cov=src/dfm --cov-report=term-missing
  smoke-cli:
    name: CLI smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: dfm demo
        run: dfm demo | head -20
      - name: dfm backtest
        run: dfm backtest --samples 24 | head -30
      - name: dfm demo --json
        run: dfm demo --json | python -m json.tool > /dev/null
      - name: dfm demo --html
        run: |
          dfm demo --html /tmp/d.html
          test -s /tmp/d.html
          grep -q "DOCTYPE html" /tmp/d.html
